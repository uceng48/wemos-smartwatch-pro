name: Build Cordova Debug APK

on:
  workflow_dispatch:  # Hanya manual agar mudah di-test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout kode
        uses: actions/checkout@v4

      - name: 2. Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install Cordova CLI
        run: npm install -g cordova

      - name: 4. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 6. Inisialisasi Project Cordova (jika belum ada)
        run: |
          # Cek apakah config.xml sudah ada
          if [ ! -f "config.xml" ]; then
            echo "config.xml tidak ditemukan. Membuat project Cordova baru..."
            cordova create temp_project com.example.app MyApp
            # Salin isi www (jika ada) ke project baru
            if [ -d "www" ]; then
              cp -r www/* temp_project/www/
            fi
            # Pindahkan semua file dari temp_project ke root (kecuali .git)
            shopt -s dotglob
            mv temp_project/* ./
            rm -rf temp_project
          else
            echo "config.xml ditemukan. Project sudah ada."
          fi

      - name: 7. Tampilkan struktur folder (debug)
        run: |
          echo "=== Isi root ==="
          ls -la
          echo "=== Isi www ==="
          ls -la www || echo "Folder www tidak ada"

      - name: 8. Tambah platform Android
        run: cordova platform add android@13.0.0 --verbose

      - name: 9. Cek platform terpasang
        run: cordova platform list

      - name: 10. Build APK Debug
        run: cordova build android --debug --verbose

      - name: 11. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-debug-apk
          path: |
            platforms/android/app/build/outputs/apk/debug/*.apk
            platforms/android/build/outputs/apk/debug/*.apk
