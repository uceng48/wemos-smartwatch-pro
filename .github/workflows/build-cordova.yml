name: Build Cordova Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Verify build-extras.gradle
        run: |
          if [ ! -f build-extras.gradle ]; then
            echo "ERROR: build-extras.gradle tidak ditemukan!"
            exit 1
          fi

      - name: Remove old Android platform & clean caches
        run: |
          cordova platform rm android || true
          rm -rf platforms/android
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          echo "Platform lama & cache Gradle dihapus."

      - name: Add Android platform
        run: cordova platform add android@13.0.0

      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-background-mode
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-network-information
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-local-notification
          echo "Semua plugins berhasil diinstal."

      - name: Inject Kotlin exclude rules to build.gradle
        run: |
          echo -e "\nallprojects {\n    configurations.all {\n        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'\n        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'\n    }\n}" >> platforms/android/build.gradle
          echo "Kotlin exclude rules injected."

      - name: Build debug APK
        run: cordova build android --debug

      - name: Prepare dist folder with build artifacts and plugins
        run: |
          # Create dist folder structure
          mkdir -p dist/apk
          mkdir -p dist/plugins
          mkdir -p dist/platforms
          
          # Copy APK to dist
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk dist/apk/
          
          # Copy plugins directory
          if [ -d plugins ]; then
            cp -r plugins/* dist/plugins/
            echo "Plugins copied to dist/plugins/"
          fi
          
          # Copy platforms/android build output
          if [ -d platforms/android/app/build ]; then
            cp -r platforms/android/app/build dist/platforms/
            echo "Build output copied to dist/platforms/"
          fi
          
          # Create a summary file
          cat > dist/BUILD_INFO.txt << EOF
Build Information
==================
Build Date: $(date)
Commit: ${{ github.sha }}
Branch: ${{ github.ref_name }}

Contents:
- apk/app-debug.apk: Debug APK file
- plugins/: All installed Cordova plugins
- platforms/: Android build outputs

Installed Plugins:
$(cordova plugin list)
EOF
          
          echo "Dist folder prepared successfully."
          ls -la dist/

      - name: Upload all artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Push dist folder to repository
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: Update build artifacts - $(date +%Y-%m-%d\ %H:%M:%S)" || echo "No changes to commit"
          git push origin main || echo "Push failed - repository may be up to date"
        continue-on-error: true
