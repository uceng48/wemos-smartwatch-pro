name: Build Cordova Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:      # Bisa dijalankan manual dari GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Verify build-extras.gradle exists
        run: |
          if [ ! -f build-extras.gradle ]; then
            echo "ERROR: build-extras.gradle not found! Build will fail."
            exit 1
          else
            echo "build-extras.gradle found."
          fi

      - name: Remove old Android platform (if any)
        run: |
          cordova platform rm android || true
          rm -rf platforms/android   # Hapus paksa jika masih tersisa

      - name: Clean Gradle cache completely
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          echo "Gradle cache cleared."

      - name: Add Android platform
        run: cordova platform add android@13.0.0

      - name: Build debug APK
        run: cordova build android --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
