name: Build Cordova Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Verify build-extras.gradle
        run: |
          if [ ! -f build-extras.gradle ]; then
            echo "ERROR: build-extras.gradle tidak ditemukan!"
            exit 1
          fi

      - name: Remove old Android platform & clean caches
        run: |
          cordova platform rm android || true
          rm -rf platforms/android
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          echo "Platform lama & cache Gradle dihapus."

      - name: Add Android platform
        run: cordova platform add android@13.0.0

      - name: Copy build-extras.gradle to Android platform
        run: |
          mkdir -p platforms/android
          cp build-extras.gradle platforms/android/
          echo "build-extras.gradle copied successfully."

      - name: Configure Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.warning.mode=all
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          echo "Gradle properties configured."

      - name: Create local.properties
        run: |
          mkdir -p platforms/android
          cat > platforms/android/local.properties << EOF
          sdk.dir=${{ env.ANDROID_SDK_ROOT }}
          ndk.dir=${{ env.ANDROID_HOME }}/ndk/25.1.8937393
          EOF
          echo "local.properties created."

      - name: Inject Kotlin exclude rules to build.gradle
        run: |
          GRADLE_FILE="platforms/android/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            # Add allprojects block if it doesn't exist
            if ! grep -q "allprojects {" "$GRADLE_FILE"; then
              cat >> "$GRADLE_FILE" << 'GRADLE_CONFIG'

allprojects {
    configurations.all {
        resolutionStrategy {
            force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
            force 'androidx.appcompat:appcompat:1.7.0'
        }
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
}
GRADLE_CONFIG
            fi
          fi
          echo "Kotlin exclude rules injected."

      - name: List Android platform structure
        run: |
          echo "=== Android Platform Structure ==="
          ls -la platforms/android/ || echo "Android platform not found"
          echo ""
          echo "=== Gradle Files ==="
          find platforms/android -name "*.gradle" -type f | head -20 || echo "No gradle files found"

      - name: Build debug APK with verbose output
        run: |
          cordova build android --debug -- \
            --warning-mode=all \
            -P android.useAndroidX=true \
            -P android.enableJetifier=true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: platforms/android/build/
          retention-days: 7
