name: Build Cordova Debug APK

on:
  workflow_dispatch:  # Hanya manual agar mudah di-test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout kode
        uses: actions/checkout@v4

      - name: 2. Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install Cordova CLI
        run: npm install -g cordova

      - name: 4. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 6. Install npm dependencies
        run: npm install

      - name: 7. Tambah platform Android
        run: |
          echo "Removing any existing android platform..."
          cordova platform remove android || true
          echo "Adding Android platform..."
          cordova platform add android@13.0.0 --verbose

      - name: 8. Cek platform terpasang
        run: |
          echo "=== Installed platforms ==="
          cordova platform list
          echo "=== Project structure ==="
          ls -la

      - name: 9. Build APK Debug
        run: cordova build android --debug --verbose

      - name: 10. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-debug-apk
          path: |
            platforms/android/app/build/outputs/apk/debug/*.apk
            platforms/android/build/outputs/apk/debug/*.apk
