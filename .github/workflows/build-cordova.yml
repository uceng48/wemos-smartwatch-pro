name: Build Cordova Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Verify build-extras.gradle
        run: |
          if [ ! -f build-extras.gradle ]; then
            echo "ERROR: build-extras.gradle tidak ditemukan!"
            exit 1
          fi

      - name: Remove old Android platform & clean caches
        run: |
          cordova platform rm android || true
          rm -rf platforms/android
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          echo "Platform lama & cache Gradle dihapus."

      - name: Add Android platform
        run: cordova platform add android@13.0.0

      - name: Inject Kotlin exclude rules to build.gradle
        run: |
          echo -e "\nallprojects {\n    configurations.all {\n        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'\n        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'\n    }\n}" >> platforms/android/build.gradle
          echo "Kotlin exclude rules injected."

      - name: Build debug APK
        run: cordova build android --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
