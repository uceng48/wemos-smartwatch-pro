name: Build Cordova Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout kode
        uses: actions/checkout@v4

      - name: 2. Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install Cordova CLI
        run: npm install -g cordova

      - name: 4. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 6. Display working directory
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Files in current directory:"
          ls -la
          echo ""
          echo "config.xml location:"
          find . -name "config.xml" -type f

      - name: 7. Install npm dependencies
        run: npm install

      - name: 8. Add Android platform
        run: cordova platform add android@13.0.0 --verbose

      - name: 9. Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-background-mode --verbose
          cordova plugin add cordova-plugin-local-notifications --verbose
          cordova plugin add cordova-plugin-insomnia --verbose
          cordova plugin add cordova-plugin-vibration --verbose
          cordova plugin add cordova-plugin-device --verbose
          cordova plugin add cordova-plugin-network-information --verbose
          cordova plugin add cordova-plugin-statusbar --verbose
          cordova plugin add cordova-plugin-splashscreen --verbose
          cordova plugin add cordova-plugin-whitelist --verbose
          cordova plugin add cordova-plugin-file --verbose
          cordova plugin add cordova-plugin-androidx --verbose
          cordova plugin add cordova-plugin-androidx-adapter --verbose
          cordova plugin add cordova-plugin-android-permissions --verbose

      - name: 10. Verify Cordova setup
        run: |
          echo "=== Cordova platforms ==="
          cordova platform list
          echo ""
          echo "=== Cordova plugins ==="
          cordova plugin list

      - name: 11. Build APK Debug
        run: cordova build android --debug --verbose

      - name: 12. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-debug-apk
          path: |
            platforms/android/app/build/outputs/apk/debug/*.apk
