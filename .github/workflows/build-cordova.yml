name: Build Cordova Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Verify build-extras.gradle
        run: |
          if [ ! -f build-extras.gradle ]; then
            echo "ERROR: build-extras.gradle tidak ditemukan!"
            exit 1
          fi

      - name: Remove old Android platform & clean caches
        run: |
          cordova platform rm android || true
          rm -rf platforms/android
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          echo "Platform lama & cache Gradle dihapus."

      - name: Add Android platform
        run: cordova platform add android@13.0.0

      - name: Copy build-extras.gradle to platforms
        run: |
          mkdir -p platforms/android
          cp build-extras.gradle platforms/android/
          echo "build-extras.gradle copied successfully."

      - name: Inject Kotlin exclude rules to build.gradle
        run: |
          GRADLE_FILE="platforms/android/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            cat >> "$GRADLE_FILE" << 'EOF'

allprojects {
    configurations.all {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk6'
    }
}
EOF
            echo "Kotlin exclude rules injected to build.gradle."
          else
            echo "WARNING: build.gradle not found at $GRADLE_FILE"
          fi

      - name: Build debug APK
        run: cordova build android --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
