name: Build Cordova Debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout kode
        uses: actions/checkout@v4

      - name: 2. Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install Cordova
        run: npm install -g cordova

      - name: 4. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 6. Tampilkan struktur folder (debug)
        run: ls -laR
        - name: Install Gradle
  run: |
    wget https://services.gradle.org/distributions/gradle-8.10-bin.zip
    unzip gradle-8.10-bin.zip
    export PATH=$PATH:$PWD/gradle-8.10/bin

      - name: 7. Tambahkan platform Android (dengan versi spesifik)
        run: |
          cordova platform add android@13
        # Jika gagal, workflow akan berhenti dan tampilkan error

      - name: 8. Build APK Debug
        run: cordova build android --debug --verbose

      - name: 9. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-debug-apk
          path: |
            platforms/android/app/build/outputs/apk/debug/*.apk
            platforms/android/build/outputs/apk/debug/*.apk
