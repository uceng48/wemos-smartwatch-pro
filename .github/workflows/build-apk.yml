name: Build Cordova Debug APK

on:
  push:
    branches: [ "main" ]   # Ganti ke "master" jika perlu
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Ambil kode dari repo
        uses: actions/checkout@v4

      - name: 2. Setup Node.js (pakai v18 agar stabil)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install Cordova CLI
        run: npm install -g cordova

      - name: 4. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 6. Hapus platform Android (jika ada) lalu tambah ulang
        run: |
          cordova platform remove android --nosave || true  # abaikan error jika belum ada
          cordova platform add android --nosave
          cordova platform list  # tampilkan platform untuk verifikasi

      - name: 7. Build APK Debug
        run: cordova build android --debug

      - name: 8. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-debug-apk
          path: |
            platforms/android/app/build/outputs/apk/debug/*.apk
            platforms/android/build/outputs/apk/debug/*.apk
