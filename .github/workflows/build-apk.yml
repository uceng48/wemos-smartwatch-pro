name: Build APK (Native Android)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Tombol manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # --- PERBAIKAN: buat folder app dulu ---
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

      # --- Buat key.properties di folder app ---
      - name: Buat key.properties
        run: |
          echo "storeFile=${{ github.workspace }}/app/keystore.jks" > app/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app/key.properties

      # --- Beri izin gradlew (opsional, tapi aman) ---
      - name: Beri izin gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
