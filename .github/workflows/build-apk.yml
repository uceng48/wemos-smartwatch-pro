name: Build Cordova Debug APK

on:
  push:
    branches: [ "main" ]   # Ganti jadi "master" jika branch utama kamu master
  workflow_dispatch:       # Biar bisa dijalankan manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Ambil kode dari repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install Cordova CLI global
        run: npm install -g cordova

      - name: 4. Setup JDK 17 (wajib untuk Android)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 5. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 6. Tambah platform Android ke project
        run: cordova platform add android --verbose

      - name: 7. Build APK Debug
        run: cordova build android --debug --verbose

      - name: 8. Upload APK hasil build
        uses: actions/upload-artifact@v4
        with:
          name: cordova-debug-apk
          # Path untuk Cordova versi terbaru (Android 9+)
          path: platforms/android/app/build/outputs/apk/debug/*.apk
