name: Build Android Debug APK

on:
  push:
    branches:
      - main # Ganti dengan nama branch utama Anda jika berbeda (misal: master)
  workflow_dispatch: # Tombol untuk menjalankan build secara manual dari GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Versi Node.js yang stabil untuk Cordova

      - name: Install Cordova CLI
        run: npm install -g cordova@latest

      - name: Install dependencies
        run: npm install

      # Setup Java JDK 17 (karena API 34 membutuhkan JDK 17)
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Setup Android SDK 34
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Add Android platform
        run: cordova platform add android --no-save

      - name: Prepare project (Copy www folder)
        run: cordova prepare android

      # Perintah build khusus untuk versi debug
      - name: Build Android Debug APK
        run: cordova build android --debug

      # Menyimpan hasil APK ke halaman github agar bisa diunduh
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
