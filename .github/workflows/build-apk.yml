name: Build Android Debug APK

on:
  push:
    branches:
      - main # Sesuaikan dengan branch Anda (misal: master)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Node 18 sangat stabil untuk cordova-android 13

      - name: Install Cordova CLI
        run: npm install -g cordova@12.0.0 # Menggunakan CLI versi 12 yang stabil

      - name: Install dependencies
        run: npm install

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Sangat cocok untuk android@13 dan target SDK 34

      # Perbaikan Utama:
      # 1. Hapus platform android yang terdeteksi di cache/package.json agar tidak bentrok.
      # 2. Tambahkan kembali platform android@13.0.0 secara bersih tanpa '--no-save'.
      - name: Add Android platform
        run: |
          cordova platform remove android || true
          cordova platform add android@13.0.0

      - name: Prepare project (Copy www folder)
        run: cordova prepare android

      - name: Build Android Debug APK
        run: cordova build android --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
