name: Build Android Debug APK

on:
  push:
    branches:
      - main # Sesuaikan dengan nama branch utama Anda (misal: master)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Menggunakan Node 20 yang stabil untuk Cordova

      - name: Install Cordova CLI
        run: npm install -g cordova@latest

      - name: Install dependencies
        run: npm install

      # Setup Java JDK 17 (karena Cordova dengan API 34 membutuhkan JDK 17)
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Langkah "Setup Android SDK" telah dihapus karena GitHub Runner (ubuntu-latest)
      # sudah memiliki Android SDK yang siap digunakan di sistemnya.

      - name: Add Android platform
        run: cordova platform add android --no-save

      - name: Prepare project (Copy www folder)
        run: cordova prepare android

      - name: Build Android Debug APK
        run: cordova build android --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
