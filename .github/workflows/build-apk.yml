name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Tombol manual di tab Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kode
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Buat file keystore dari base64
    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

    # Buat key.properties agar build.gradle terbaca
    - name: Buat key.properties
      run: |
        echo "storeFile=${{ github.workspace }}/app/keystore.jks" > key.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
        mv key.properties app/

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload APK sebagai Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
