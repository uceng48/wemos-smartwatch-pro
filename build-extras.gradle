configurations.all {
    resolutionStrategy {
        force 'androidx.appcompat:appcompat:1.7.0'
        force 'androidx.core:core:1.13.1'
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.23'
        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.23'
        force 'com.google.android.material:material:1.11.0'
    }
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk6'
}
