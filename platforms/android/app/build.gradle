apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "com.uceng48.wemospro"
    compileSdkVersion 34
    
    defaultConfig {
        applicationId "com.uceng48.wemospro"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 4
        versionName "4.2.0"
        vectorDrawables.useSupportLibrary = true
        
        // Untuk menghindari 65K method limit
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            debuggable false
            signingConfig signingConfigs.debug // Ganti dengan release signing config di production
        }
        debug {
            debuggable true
        }
    }

    lintOptions {
        checkReleaseBuilds true
        disable 'MissingTranslation',
                'ExtraTranslation',
                'MissingDimensionProductFlavor',
                'GooglePlayForegroundServiceType'
    }

    packagingOptions {
        exclude 'META-INF/rxjava.properties'
        exclude 'META-INF/proguard/androidx-*.pro'
    }

    // Dependency resolution strategy
    configurations.all {
        resolutionStrategy {
            // Force versi untuk menghindari duplikasi
            force 'androidx.appcompat:appcompat:1.6.1'
            force 'androidx.core:core:1.10.1'
            force 'androidx.activity:activity:1.7.2'
            force 'androidx.fragment:fragment:1.6.1'
            force 'androidx.collection:collection:1.2.0'
            force 'androidx.cardview:cardview:1.0.0'
            force 'androidx.constraintlayout:constraintlayout:2.1.4'
            force 'com.google.android.material:material:1.9.0'
        }
    }
}

dependencies {
    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.10.1'
    implementation 'androidx.activity:activity:1.7.2'
    implementation 'androidx.fragment:fragment:1.6.1'
    implementation 'androidx.collection:collection:1.2.0'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'com.google.android.material:material:1.9.0'
    
    // Kotlin
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
    
    // Cordova webview
    implementation 'org.apache.cordova:cordova-android:13.0.0'
    
    // Multi-dex support untuk apps dengan banyak methods
    implementation 'androidx.multidex:multidex:2.0.1'
}
