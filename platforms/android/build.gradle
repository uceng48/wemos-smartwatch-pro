// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        mavenLocal()
    }
}

// Global gradle configuration untuk menghindari duplicate classes
subprojects {
    configurations.all {
        resolutionStrategy {
            // Force versi specific untuk menghindari conflict
            force 'androidx.appcompat:appcompat:1.6.1'
            force 'androidx.core:core:1.10.1'
            force 'androidx.activity:activity:1.7.2'
            force 'androidx.fragment:fragment:1.6.1'
            force 'androidx.collection:collection:1.2.0'
            force 'androidx.cardview:cardview:1.0.0'
            force 'androidx.constraintlayout:constraintlayout:2.1.4'
            force 'com.google.android.material:material:1.9.0'
            
            // Jika ada conflict dengan play services
            force 'com.google.android.gms:play-services-basement:18.1.0'
        }
    }
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}
